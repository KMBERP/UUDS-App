name: Build UUDS Parts Inspection APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Scaffold native Android project
        run: flutter create --platforms=android --org com.uudsaero --project-name uuds_parts_app scaffold_tmp

      - name: Copy app source into scaffold
        run: |
          rm -rf scaffold_tmp/lib
          cp -r source/lib scaffold_tmp/lib
          rm -rf scaffold_tmp/assets
          cp -r source/assets scaffold_tmp/assets
          cp source/pubspec.yaml scaffold_tmp/pubspec.yaml

      - name: Stamp real build ID into the app (for on-device verification)
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_ID="${SHORT_SHA}-run${{ github.run_number }}"
          echo "Stamping build ID: $BUILD_ID"
          cat > scaffold_tmp/lib/utils/build_info.dart << EOF
          /// Auto-generated by the CI workflow for this specific build - see
          /// build-apk.yml "Stamp real build ID" step. If the app shows
          /// "dev-build (uninjected)" instead of a value like this, it did
          /// NOT come from this pipeline.
          const String kBuildId = '$BUILD_ID';
          EOF
          cat scaffold_tmp/lib/utils/build_info.dart

      - name: Add camera + storage permissions, app label
        run: |
          MANIFEST=scaffold_tmp/android/app/src/main/AndroidManifest.xml
          sed -i 's#<application#<uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n    <application#' "$MANIFEST"
          sed -i 's/android:label="[^"]*"/android:label="UUDS Parts Inspection"/' "$MANIFEST"

      - name: Add native MediaStore publish channel (MainActivity)
        run: |
          set -e
          EXISTING=$(find scaffold_tmp/android/app/src/main -type f -name "MainActivity.*" | head -n1)
          if [ -z "$EXISTING" ]; then
            echo "::error::flutter create did not generate a MainActivity.kt/.java - cannot inject the photo_store channel"
            find scaffold_tmp/android/app/src/main -maxdepth 5
            exit 1
          fi
          echo "Found existing MainActivity at: $EXISTING (this will be replaced)"
          MAIN_ACT_DIR=$(dirname "$EXISTING")
          rm -f "$EXISTING"
          mkdir -p "$MAIN_ACT_DIR"
          cat > "$MAIN_ACT_DIR/MainActivity.kt" << 'KOTLIN_EOF'
          package com.uudsaero.uuds_parts_app

          import android.content.ContentValues
          import android.media.MediaScannerConnection
          import android.os.Build
          import android.os.Environment
          import android.provider.MediaStore
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel
          import java.io.File
          import java.io.FileInputStream

          /**
           * Mirrors a photo the app already saved privately into the device's
           * public Gallery, nested as Pictures/UUDS/<Aircraft>/<InspectionType>/
           * <Location>/<fileName>, using the MediaStore API on Android 10+ and a
           * direct public-folder write (with a media-scan) on Android 9 and
           * below. Neither path needs the broad "All files access" permission.
           * Returns a {success, error} map so the Dart side can show the real
           * reason if publishing ever fails, instead of a bare boolean.
           */
          class MainActivity : FlutterActivity() {
              private val CHANNEL = "uuds/photo_store"

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      if (call.method == "publishToGallery") {
                          try {
                              val sourcePath = call.argument<String>("sourcePath")!!
                              val aircraft = call.argument<String>("aircraft") ?: "Unknown"
                              val type = call.argument<String>("type") ?: "Unknown"
                              val location = call.argument<String>("location") ?: "Unknown"
                              val fileName = call.argument<String>("fileName")!!
                              result.success(publishToGallery(sourcePath, aircraft, type, location, fileName))
                          } catch (e: Exception) {
                              result.success(mapOf("success" to false, "error" to (e.message ?: e.toString())))
                          }
                      } else {
                          result.notImplemented()
                      }
                  }
              }

              private fun publishToGallery(
                  sourcePath: String,
                  aircraft: String,
                  type: String,
                  location: String,
                  fileName: String
              ): Map<String, Any?> {
                  val source = File(sourcePath)
                  if (!source.exists()) {
                      return mapOf("success" to false, "error" to "Source file missing: $sourcePath")
                  }

                  return try {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                          // Trailing slash matters here - MediaStore can silently
                          // misplace the file into the wrong (or a flat) folder
                          // on some OEM builds if it's omitted.
                          val relativePath = "Pictures/UUDS/$aircraft/$type/$location/"
                          val values = ContentValues().apply {
                              put(MediaStore.Images.Media.DISPLAY_NAME, fileName)
                              put(MediaStore.Images.Media.MIME_TYPE, "image/jpeg")
                              put(MediaStore.Images.Media.RELATIVE_PATH, relativePath)
                              put(MediaStore.Images.Media.IS_PENDING, 1)
                          }
                          val resolver = applicationContext.contentResolver
                          val uri = resolver.insert(MediaStore.Images.Media.EXTERNAL_CONTENT_URI, values)
                              ?: return mapOf("success" to false, "error" to "MediaStore insert() returned null")

                          val stream = resolver.openOutputStream(uri)
                          if (stream == null) {
                              resolver.delete(uri, null, null)
                              return mapOf("success" to false, "error" to "openOutputStream() returned null")
                          }
                          stream.use { out -> FileInputStream(source).use { input -> input.copyTo(out) } }

                          val doneValues = ContentValues()
                          doneValues.put(MediaStore.Images.Media.IS_PENDING, 0)
                          resolver.update(uri, doneValues, null, null)
                          mapOf("success" to true, "error" to null)
                      } else {
                          val dir = File(
                              Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_PICTURES),
                              "UUDS/$aircraft/$type/$location"
                          )
                          if (!dir.exists()) dir.mkdirs()
                          val dest = File(dir, fileName)
                          FileInputStream(source).use { input ->
                              dest.outputStream().use { output -> input.copyTo(output) }
                          }
                          MediaScannerConnection.scanFile(applicationContext, arrayOf(dest.absolutePath), null, null)
                          mapOf("success" to true, "error" to null)
                      }
                  } catch (e: Exception) {
                      mapOf("success" to false, "error" to (e.message ?: e.toString()))
                  }
              }
          }
          KOTLIN_EOF
          echo "----- MainActivity.kt written to $MAIN_ACT_DIR -----"
          test -f "$MAIN_ACT_DIR/MainActivity.kt" && wc -l "$MAIN_ACT_DIR/MainActivity.kt"
          if ! grep -q 'uuds/photo_store' "$MAIN_ACT_DIR/MainActivity.kt"; then
            echo "::error::MainActivity.kt was written but does not contain the uuds/photo_store channel - refusing to build a broken APK"
            exit 1
          fi
          if ! grep -q 'package com.uudsaero.uuds_parts_app' "$MAIN_ACT_DIR/MainActivity.kt"; then
            echo "::error::MainActivity.kt package does not match com.uudsaero.uuds_parts_app - the manifest's activity won't resolve to this class"
            exit 1
          fi
          echo "OK: photo_store channel confirmed present in MainActivity.kt"
          echo "----- MainActivity.kt written to $MAIN_ACT_DIR -----"
          test -f "$MAIN_ACT_DIR/MainActivity.kt" && wc -l "$MAIN_ACT_DIR/MainActivity.kt"

      - name: Force compileSdk/targetSdk 36 (fixes plugin AAR metadata requirements)
        run: |
          for GRADLE_FILE in scaffold_tmp/android/app/build.gradle.kts scaffold_tmp/android/app/build.gradle; do
            if [ -f "$GRADLE_FILE" ]; then
              sed -i 's/flutter\.compileSdkVersion/36/' "$GRADLE_FILE"
              sed -i 's/flutter\.targetSdkVersion/36/' "$GRADLE_FILE"
              sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 36/' "$GRADLE_FILE"
              sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 36/' "$GRADLE_FILE"
            fi
          done

      - name: Get packages
        working-directory: scaffold_tmp
        run: flutter pub get

      - name: Force compileSdk 36 on every downloaded plugin (fixes AAR metadata requirements)
        run: |
          find "$HOME/.pub-cache" -path "*/android/build.gradle*" -print0 2>/dev/null | \
          xargs -0 -r sed -i \
            -e 's/compileSdkVersion flutter\.compileSdkVersion/compileSdkVersion 36/' \
            -e 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 36/' \
            -e 's/compileSdk flutter\.compileSdkVersion/compileSdk 36/' \
            -e 's/compileSdkVersion [0-9][0-9]*/compileSdkVersion 36/' \
            -e 's/compileSdk = [0-9][0-9]*/compileSdk = 36/'

      - name: Generate app icon from logo
        working-directory: scaffold_tmp
        run: dart run flutter_launcher_icons

      - name: Add ProGuard rules for ML Kit text recognition (fixes runtime NullPointerException)
        run: |
          PROGUARD_FILE=scaffold_tmp/android/app/proguard-rules.pro
          touch "$PROGUARD_FILE"
          cat >> "$PROGUARD_FILE" << 'EOF'

          # Keep all ML Kit vision/text classes so R8 doesn't strip anything
          # the plugin needs reflectively at runtime (this fixes a
          # NullPointerException crash when the recognizer initializes).
          -keep class com.google.mlkit.** { *; }
          -keep class com.google_mlkit_text_recognition.** { *; }
          -keep class com.google.android.gms.internal.mlkit_vision_text_common.** { *; }
          -dontwarn com.google.mlkit.**
          EOF

      - name: Build release APK
        working-directory: scaffold_tmp
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: UUDS-Parts-Inspection-APK
          path: scaffold_tmp/build/app/outputs/flutter-apk/app-release.apk
